<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tracker-container">
        <div class="header-accent"></div>
        <h1>Task Tracker</h1>
        
        <div class="sort-area">
            <button id="sortBtn">
                <img src="img/sort-asc.svg" id="sortIcon" alt="Sort">
            </button>
        </div>

        <ul id="taskList">
            </ul>

        <div class="add-section">
            <button id="addBtn">
                <img src="img/add-button.svg" alt="Add Task">
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
